<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0A0C12"/>
      <stop offset="100%" stop-color="#0F1118"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#C9A84C"/>
      <stop offset="100%" stop-color="#E8C97A"/>
    </linearGradient>
    <radialGradient id="glow1" cx="30%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#C9A84C" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#C9A84C" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="80%" cy="70%" r="40%">
      <stop offset="0%" stop-color="#A78BFA" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#A78BFA" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow1)"/>
  <rect width="1200" height="630" fill="url(#glow2)"/>

  <!-- Border frame -->
  <rect x="24" y="24" width="1152" height="582" rx="20" fill="none"
        stroke="#C9A84C" stroke-opacity="0.2" stroke-width="1.5"/>

  <!-- Brand mark -->
  <rect x="72" y="72" width="80" height="80" rx="16" fill="#C9A84C" fill-opacity="0.15"
        stroke="#C9A84C" stroke-opacity="0.4" stroke-width="1.5"/>
  <text x="112" y="128" font-family="Georgia, 'Times New Roman', serif" font-size="56"
        font-weight="700" text-anchor="middle" fill="#C9A84C">S</text>

  <!-- Wordmark -->
  <text x="176" y="127" font-family="Georgia, 'Times New Roman', serif" font-size="52"
        font-weight="700" fill="#F5F2EC" letter-spacing="-1">Synapti</text>
  <text x="176" y="127" font-family="Georgia, 'Times New Roman', serif" font-size="52"
        font-weight="700" fill="#C9A84C" letter-spacing="-1" dx="226">q</text>

  <!-- Tag line -->
  <text x="72" y="200" font-family="'DM Sans', Arial, sans-serif" font-size="22"
        fill="#8892A4" letter-spacing="0.5">UK's most focused A-Level Maths AI tutor</text>

  <!-- Divider -->
  <rect x="72" y="230" width="120" height="2" rx="1" fill="url(#gold)"/>

  <!-- Feature pills -->
  <g transform="translate(72, 270)">
    <!-- Pill 1 -->
    <rect width="220" height="48" rx="24" fill="#151821" stroke="#C9A84C" stroke-opacity="0.3" stroke-width="1"/>
    <text x="110" y="31" font-family="'DM Sans', Arial, sans-serif" font-size="16"
          text-anchor="middle" fill="#F5F2EC">✦ AI Tutor</text>

    <!-- Pill 2 -->
    <rect x="236" width="260" height="48" rx="24" fill="#151821" stroke="#C9A84C" stroke-opacity="0.3" stroke-width="1"/>
    <text x="366" y="31" font-family="'DM Sans', Arial, sans-serif" font-size="16"
          text-anchor="middle" fill="#F5F2EC">✦ Exam Practice</text>

    <!-- Pill 3 -->
    <rect x="512" width="280" height="48" rx="24" fill="#151821" stroke="#C9A84C" stroke-opacity="0.3" stroke-width="1"/>
    <text x="652" y="31" font-family="'DM Sans', Arial, sans-serif" font-size="16"
          text-anchor="middle" fill="#F5F2EC">✦ Spaced Revision</text>
  </g>

  <!-- Big headline -->
  <text x="72" y="420" font-family="Georgia, 'Times New Roman', serif" font-size="64"
        font-weight="700" fill="#F5F2EC">Master A-Level Maths</text>
  <text x="72" y="490" font-family="Georgia, 'Times New Roman', serif" font-size="64"
        font-weight="700" fill="url(#gold)">with AI.</text>

  <!-- Sub copy -->
  <text x="72" y="555" font-family="'DM Sans', Arial, sans-serif" font-size="22"
        fill="#8892A4">Step-by-step working · Past paper practice · Free 7-day trial</text>

  <!-- Right decorative element -->
  <g transform="translate(900, 200)">
    <circle cx="150" cy="150" r="140" fill="none" stroke="#C9A84C" stroke-opacity="0.06" stroke-width="60"/>
    <circle cx="150" cy="150" r="90" fill="none" stroke="#C9A84C" stroke-opacity="0.08" stroke-width="1.5"/>
    <circle cx="150" cy="150" r="50" fill="#C9A84C" fill-opacity="0.08"/>
    <text x="150" y="168" font-family="Georgia, serif" font-size="52" font-weight="700"
          text-anchor="middle" fill="#C9A84C">∑</text>
  </g>
</svg>
