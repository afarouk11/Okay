<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reset Password — Synaptiq</title>
<meta name="robots" content="noindex">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'DM Sans', system-ui, sans-serif;
    background: #03050D;
    color: #F0EEF8;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 1rem;
  }
  .card {
    background: rgba(10,12,18,0.97);
    border: 1px solid rgba(201,168,76,0.3);
    border-radius: 20px;
    padding: 2.5rem 2rem;
    width: 100%;
    max-width: 420px;
    box-shadow: 0 32px 80px rgba(0,0,0,0.6);
  }
  .logo {
    text-align: center;
    font-size: 1.6rem;
    font-weight: 900;
    color: #C9A84C;
    margin-bottom: 1.5rem;
    letter-spacing: -0.02em;
  }
  h1 { font-size: 1.2rem; font-weight: 700; margin-bottom: .4rem; }
  p { color: #6B7394; font-size: .88rem; margin-bottom: 1.5rem; }
  label { display: block; font-size: .82rem; color: #94A3B8; margin-bottom: .35rem; }
  input {
    width: 100%;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 10px;
    padding: .75rem 1rem;
    color: #F0EEF8;
    font-size: .95rem;
    outline: none;
    transition: border-color .2s;
    margin-bottom: 1rem;
  }
  input:focus { border-color: #C9A84C; }
  .btn {
    width: 100%;
    background: linear-gradient(135deg, #C9A84C, #A07830);
    color: #08090E;
    border: none;
    border-radius: 12px;
    padding: .85rem;
    font-size: 1rem;
    font-weight: 800;
    cursor: pointer;
    transition: opacity .2s;
  }
  .btn:hover { opacity: .9; }
  .btn:disabled { opacity: .5; cursor: not-allowed; }
  .msg {
    padding: .75rem 1rem;
    border-radius: 10px;
    font-size: .85rem;
    margin-bottom: 1rem;
    display: none;
  }
  .msg.success { background: rgba(34,197,94,0.1); border: 1px solid rgba(34,197,94,0.3); color: #4ade80; }
  .msg.error   { background: rgba(239,68,68,0.1);  border: 1px solid rgba(239,68,68,0.3);  color: #f87171; }
  .back { text-align: center; margin-top: 1.25rem; font-size: .82rem; color: #6B7394; }
  .back a { color: #C9A84C; text-decoration: none; cursor: pointer; }
</style>
</head>
<body>
<div class="card">
  <div class="logo">Synapti<span style="color:#fff">q</span></div>
  <h1>Set a new password</h1>
  <p>Enter your new password below. It must be at least 8 characters.</p>

  <div class="msg" id="msg"></div>

  <form id="reset-form" onsubmit="handleReset(event)">
    <label for="password">New password</label>
    <input type="password" id="password" placeholder="At least 8 characters" required minlength="8">
    <label for="confirm">Confirm password</label>
    <input type="password" id="confirm" placeholder="Repeat your new password" required minlength="8">
    <button class="btn" type="submit" id="submit-btn">Update Password</button>
  </form>

  <div class="back"><a href="/">← Back to Synaptiq</a></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script>
  const SUPABASE_URL  = window.SUPABASE_URL  || '';
  const SUPABASE_ANON = window.SUPABASE_ANON_KEY || '';

  function showMsg(text, type) {
    const el = document.getElementById('msg');
    el.textContent = text;
    el.className = 'msg ' + type;
    el.style.display = 'block';
  }

  let supabase = null;
  if (SUPABASE_URL && SUPABASE_ANON) {
    supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON);
  } else {
    document.getElementById('reset-form').style.display = 'none';
    showMsg('Password reset is not available in demo mode. Please contact support.', 'error');
  }

  // Supabase puts the recovery token in the URL hash — exchange it for a session
  async function init() {
    if (!supabase) return;
    const hash = window.location.hash;
    if (hash.includes('type=recovery') || hash.includes('access_token')) {
      // The Supabase client picks up the hash automatically on createClient
      const { data: { session }, error } = await supabase.auth.getSession();
      if (error || !session) {
        showMsg('This link has expired or is invalid. Please request a new reset link.', 'error');
        document.getElementById('submit-btn').disabled = true;
      }
    }
  }

  async function handleReset(e) {
    e.preventDefault();
    if (!supabase) { showMsg('Password reset is unavailable. Please contact support.', 'error'); return; }
    const password = document.getElementById('password').value;
    const confirm  = document.getElementById('confirm').value;
    if (password !== confirm) { showMsg('Passwords do not match.', 'error'); return; }
    if (password.length < 8) { showMsg('Password must be at least 8 characters.', 'error'); return; }

    const btn = document.getElementById('submit-btn');
    btn.disabled = true;
    btn.textContent = 'Updating…';

    const { error } = await supabase.auth.updateUser({ password });
    if (error) {
      showMsg(error.message || 'Failed to update password. Please try again.', 'error');
      btn.disabled = false;
      btn.textContent = 'Update Password';
      return;
    }

    showMsg('Password updated! Redirecting to dashboard…', 'success');
    document.getElementById('reset-form').style.display = 'none';
    setTimeout(() => { window.location.href = '/'; }, 1800);
  }

  init();
</script>
<!-- Jarvis floating widget -->
<script src="/src/components/jarvis-widget.js"></script>
</body>
</html>
