<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page Not Found — Synaptiq</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', sans-serif;
      background: #07080C;
      color: #F5F2EC;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
    }
    .logo { font-size: 1.5rem; font-weight: 800; letter-spacing: -.02em; margin-bottom: 3rem; }
    .logo span { color: #C9A84C; }
    .code { font-size: 6rem; font-weight: 800; line-height: 1; color: #C9A84C; margin-bottom: 1rem; }
    h1 { font-size: 1.5rem; font-weight: 700; margin-bottom: .75rem; }
    p { color: #8892A4; font-size: .95rem; max-width: 380px; line-height: 1.6; margin-bottom: 2rem; }
    .btn {
      display: inline-block;
      background: #C9A84C;
      color: #07080C;
      padding: .85rem 2rem;
      border-radius: 10px;
      text-decoration: none;
      font-weight: 700;
      font-size: .95rem;
      transition: background .2s;
    }
    .btn:hover { background: #D4B86A; }
    .hint { margin-top: 1.5rem; font-size: .8rem; color: #8892A4; }
  </style>
</head>
<body>
  <div class="logo">Synapti<span>q</span></div>
  <div class="code">404</div>
  <h1>Page not found</h1>
  <p>This page doesn't exist or has moved. Head back to the dashboard to continue your A-Level revision.</p>
  <a href="/" class="btn">Back to Synaptiq →</a>
  <p class="hint">If you followed a link and landed here, please <a href="mailto:hello@synaptiqai.co.uk" style="color:#C9A84C">let us know</a>.</p>
<!-- Jarvis floating widget -->
<script src="/src/components/jarvis-widget.js"></script>
</body>
</html>
